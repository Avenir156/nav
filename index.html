<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER NAV // 个人导航</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-grid: #0d0d18;
            --neon-pink: #ff2a6d;
            --neon-cyan: #05d9e8;
            --neon-purple: #d300c5;
            --neon-yellow: #f9f002;
            --text-primary: #e0e0ff;
            --text-secondary: #8888aa;
            --text-muted: #555566;
            --grid-line: rgba(5, 217, 232, 0.15);
            --scanline: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Grid Background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(180deg, transparent 0%, var(--bg-deep) 50%, transparent 100%);
            z-index: -2;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scanline) 2px,
                var(--scanline) 4px
            );
            z-index: 1000;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Glow Effects */
        .glow-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            animation: float 8s ease-in-out infinite;
        }

        .glow-orb.pink {
            background: var(--neon-pink);
            top: 10%;
            left: 10%;
        }

        .glow-orb.cyan {
            background: var(--neon-cyan);
            bottom: 20%;
            right: 15%;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* Header */
        .cyber-header {
            padding: 40px 20px;
            text-align: center;
            position: relative;
            border-bottom: 2px solid var(--neon-cyan);
            background: linear-gradient(180deg, rgba(5, 217, 232, 0.1) 0%, transparent 100%);
        }

        .cyber-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            color: var(--neon-cyan);
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan),
                0 0 80px var(--neon-cyan);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
            100% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-cyan); }
        }

        .cyber-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--neon-pink);
            letter-spacing: 0.3em;
            margin-top: 10px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .header-deco {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .deco-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
        }

        /* Navigation Bar */
        .cyber-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(10, 10, 18, 0.8);
            border-bottom: 1px solid var(--grid-line);
            flex-wrap: wrap;
        }

        .search-module {
            display: flex;
            align-items: center;
            background: rgba(13, 13, 24, 0.9);
            border: 1px solid var(--neon-cyan);
            padding: 8px 16px;
            position: relative;
        }

        .search-module::before {
            content: 'SEARCH://';
            font-size: 0.7rem;
            color: var(--neon-cyan);
            letter-spacing: 0.1em;
            margin-right: 10px;
        }

        .search-input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            width: 200px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-cyan);
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Categories */
        .category-modules {
            display: flex;
            justify-content: center;
            gap: 0;
            padding: 20px;
            flex-wrap: wrap;
        }

        .cat-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .cat-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            transition: left 0.5s;
        }

        .cat-btn:hover::before {
            left: 100%;
        }

        .cat-btn:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .cat-btn.active {
            background: var(--neon-cyan);
            border-color: var(--neon-cyan);
            color: var(--bg-deep);
            text-shadow: none;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        /* Links Grid */
        .cyber-grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Link Card */
        .link-card {
            background: rgba(13, 13, 24, 0.9);
            border: 1px solid var(--grid-line);
            padding: 20px;
            position: relative;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: all 0.3s;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .link-card:hover {
            border-color: var(--neon-pink);
            transform: translateY(-5px);
            box-shadow: 
                0 10px 30px rgba(255, 42, 109, 0.3),
                inset 0 0 20px rgba(255, 42, 109, 0.1);
        }

        .link-card:hover::before {
            opacity: 0.1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.05em;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
        }

        .card-tag {
            color: var(--neon-cyan);
            letter-spacing: 0.1em;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .card-url {
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 150px;
        }

        /* Add Button */
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--neon-pink);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 30px var(--neon-pink);
            transition: all 0.3s;
            z-index: 100;
        }

        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px var(--neon-pink);
        }

        .add-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--bg-deep);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 18, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: rgba(13, 13, 24, 0.95);
            border: 2px solid var(--neon-cyan);
            padding: 30px;
            width: 90%;
            max-width: 450px;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px));
        }

        .modal::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple), var(--neon-cyan));
            z-index: -1;
            filter: blur(20px);
            opacity: 0.5;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-cyan);
            letter-spacing: 0.1em;
            margin-bottom: 24px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .form-field {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            color: var(--neon-pink);
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }

        .form-input, .form-select {
            width: 100%;
            background: rgba(10, 10, 18, 0.8);
            border: 1px solid var(--grid-line);
            padding: 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: var(--neon-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .btn-primary:hover {
            box-shadow: 0 0 40px var(--neon-cyan);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        /* Footer */
        .cyber-footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--grid-line);
            background: linear-gradient(180deg, transparent, rgba(5, 217, 232, 0.05));
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
        }

        .footer-text span {
            color: var(--neon-pink);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            color: var(--neon-pink);
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .cyber-grid {
                grid-template-columns: 1fr;
            }
            .category-modules {
                gap: 0;
            }
            .cat-btn {
                flex: 1;
                text-align: center;
            }
            .add-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
        }

        /* Animations */
        @keyframes cardFadeIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }

        .link-card {
            animation: cardFadeIn 0.5s ease backwards;
        }

        .link-card:nth-child(1) { animation-delay: 0.1s; }
        .link-card:nth-child(2) { animation-delay: 0.15s; }
        .link-card:nth-child(3) { animation-delay: 0.2s; }
        .link-card:nth-child(4) { animation-delay: 0.25s; }
        .link-card:nth-child(5) { animation-delay: 0.3s; }
        .link-card:nth-child(6) { animation-delay: 0.35s; }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="grid-bg"></div>
    <div class="glow-orb pink"></div>
    <div class="glow-orb cyan"></div>
    <div class="scanlines"></div>

    <!-- Header -->
    <header class="cyber-header">
        <h1 class="cyber-title">CYBER NAV</h1>
        <p class="cyber-subtitle">// PERSONAL NAVIGATION SYSTEM v2.0</p>
        <div class="header-deco">
            <div class="deco-line"></div>
            <div class="deco-line"></div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="cyber-nav">
        <div class="search-module">
            <input type="text" class="search-input" id="searchInput" placeholder="输入关键词...">
        </div>
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>SYSTEM ONLINE</span>
        </div>
    </nav>

    <!-- Categories -->
    <div class="category-modules" id="categories"></div>

    <!-- Links Grid -->
    <main class="cyber-grid" id="linksGrid"></main>

    <!-- Add Button -->
    <button class="add-btn" id="addBtn" title="新增链接">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
        </svg>
    </button>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="modal-title" id="modalTitle">NEW LINK</h2>
            <div class="form-field">
                <label class="form-label">TITLE:</label>
                <input type="text" class="form-input" id="inputName" placeholder="链接名称">
            </div>
            <div class="form-field">
                <label class="form-label">URL:</label>
                <input type="url" class="form-input" id="inputUrl" placeholder="https://...">
            </div>
            <div class="form-field">
                <label class="form-label">DESCRIPTION:</label>
                <input type="text" class="form-input" id="inputDesc" placeholder="简短描述">
            </div>
            <div class="form-field">
                <label class="form-label">CATEGORY:</label>
                <select class="form-select" id="inputCategory">
                    <option value="工作">WORK</option>
                    <option value="学习">LEARN</option>
                    <option value="工具">TOOLS</option>
                    <option value="娱乐">FUN</option>
                    <option value="其他">OTHER</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="cancelBtn">CANCEL</button>
                <button class="btn btn-primary" id="saveBtn">SAVE</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="cyber-footer">
        <p class="footer-text">CYBER NAV SYSTEM <span>//</span> 2026</p>
    </footer>

    <script>
        const STORAGE_KEY = 'nav_links';

        const defaultLinks = [
            { id: 1, name: 'GitHub', url: 'https://github.com', desc: '全球代码托管平台，开源项目核心枢纽', category: '工作' },
            { id: 2, name: 'Stack Overflow', url: 'https://stackoverflow.com', desc: '开发者问答社区，技术问题解决方案库', category: '学习' },
            { id: 3, name: 'ChatGPT', url: 'https://chat.openai.com', desc: 'AI对话系统，智能问答与创作助手', category: '工具' },
            { id: 4, name: 'Bilibili', url: 'https://bilibili.com', desc: '视频弹幕平台，Z世代文化社区', category: '娱乐' },
            { id: 5, name: 'MDN Docs', url: 'https://developer.mozilla.org', desc: 'Web开发权威文档，前端开发者必备', category: '学习' },
            { id: 6, name: 'Canva', url: 'https://canva.com', desc: '在线设计工具，快速创建视觉作品', category: '工具' },
            { id: 7, name: 'Hardware Rank', url: 'hardware-rank.html', desc: '硬件天梯榜 · CPU/GPU/手机处理器性能排行', category: '工具' },
        ];

        function getLinks() {
            const stored = localStorage.getItem(STORAGE_KEY);
            let links = stored ? JSON.parse(stored) : defaultLinks;
            
            // 检查是否有新链接需要添加
            const existingIds = new Set(links.map(l => l.id));
            defaultLinks.forEach(defaultLink => {
                if (!existingIds.has(defaultLink.id)) {
                    links.push(defaultLink);
                }
            });
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
            return links;
        }

        function saveLinks(links) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
        }

        function getCategories(links) {
            const cats = new Set(links.map(l => l.category));
            return ['ALL', ...cats];
        }

        function renderCategories(activeCategory = 'ALL') {
            const links = getLinks();
            const categories = getCategories(links);
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => `
                <button class="cat-btn ${cat === activeCategory ? 'active' : ''}" data-category="${cat}">
                    ${cat}
                </button>
            `).join('');
        }

        function renderLinks(filter = { category: 'ALL', search: '' }) {
            let links = getLinks();
            
            if (filter.category !== 'ALL') {
                links = links.filter(l => l.category === filter.category);
            }
            
            if (filter.search) {
                const term = filter.search.toLowerCase();
                links = links.filter(l => 
                    l.name.toLowerCase().includes(term) || 
                    l.desc.toLowerCase().includes(term) ||
                    l.url.toLowerCase().includes(term)
                );
            }

            const container = document.getElementById('linksGrid');
            
            if (links.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: span 3;">
                        <div class="empty-icon">◈</div>
                        <p>NO DATA FOUND</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = links.map(link => `
                <a href="${link.url}" target="_blank" class="link-card" data-id="${link.id}">
                    <div class="card-header">
                        <div class="card-icon">◈</div>
                        <div class="card-title">${link.name}</div>
                    </div>
                    <div class="card-desc">${link.desc || ''}</div>
                    <div class="card-meta">
                        <span class="card-tag">${link.category}</span>
                        <span class="card-url">${link.url}</span>
                    </div>
                </a>
            `).join('');
        }

        let editingId = null;

        function openModal(link = null) {
            editingId = link ? link.id : null;
            document.getElementById('modalTitle').textContent = link ? 'EDIT LINK' : 'NEW LINK';
            document.getElementById('inputName').value = link ? link.name : '';
            document.getElementById('inputUrl').value = link ? link.url : '';
            document.getElementById('inputDesc').value = link ? link.desc : '';
            document.getElementById('inputCategory').value = link ? link.category : '工作';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            editingId = null;
        }

        function saveLink() {
            const name = document.getElementById('inputName').value.trim();
            const url = document.getElementById('inputUrl').value.trim();
            const desc = document.getElementById('inputDesc').value.trim();
            const category = document.getElementById('inputCategory').value;

            if (!name || !url) {
                alert('请填写标题和网址');
                return;
            }

            let links = getLinks();
            
            if (editingId) {
                links = links.map(l => l.id === editingId ? { ...l, name, url, desc, category } : l);
            } else {
                links.push({
                    id: Date.now(),
                    name,
                    url,
                    desc,
                    category
                });
            }

            saveLinks(links);
            closeModal();
            renderCategories();
            renderLinks();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
            renderLinks();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const activeCat = document.querySelector('.cat-btn.active')?.dataset.category || 'ALL';
                renderLinks({ category: activeCat, search: e.target.value });
            });

            document.getElementById('categories').addEventListener('click', (e) => {
                if (e.target.classList.contains('cat-btn')) {
                    document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    const search = document.getElementById('searchInput').value;
                    renderLinks({ category: e.target.dataset.category, search });
                }
            });

            document.getElementById('addBtn').addEventListener('click', () => openModal());
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('saveBtn').addEventListener('click', saveLink);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
                if (e.key === '/' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        });
    </script>
</body>
</html>
