<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARDWARE RANK // 硬件天梯榜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-grid: #0d0d18;
            --neon-pink: #ff2a6d;
            --neon-cyan: #05d9e8;
            --neon-purple: #d300c5;
            --neon-yellow: #f9f002;
            --neon-green: #00ff88;
            --neon-orange: #ff6b35;
            --text-primary: #e0e0ff;
            --text-secondary: #8888aa;
            --text-muted: #555566;
            --grid-line: rgba(5, 217, 232, 0.15);
            --rank-gold: #ffd700;
            --rank-silver: #c0c0c0;
            --rank-bronze: #cd7f32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .grid-bg {
            position: fixed; inset: 0;
            background:
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(180deg, transparent 0%, var(--bg-deep) 50%, transparent 100%);
            z-index: -2;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
            z-index: 1000; pointer-events: none; opacity: 0.4;
        }

        .glow-orb {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            filter: blur(100px); opacity: 0.2; z-index: -1;
            animation: float 8s ease-in-out infinite;
        }
        .glow-orb.pink { background: var(--neon-pink); top: 5%; left: 5%; }
        .glow-orb.cyan { background: var(--neon-cyan); bottom: 10%; right: 10%; animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .cyber-header {
            padding: 30px 20px; text-align: center; position: relative;
            border-bottom: 2px solid var(--neon-cyan);
            background: linear-gradient(180deg, rgba(5,217,232,0.1) 0%, transparent 100%);
        }

        .cyber-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
            letter-spacing: 0.15em; color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
            100% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-cyan); }
        }

        .cyber-subtitle {
            font-family: 'Share Tech Mono', monospace; font-size: 0.85rem;
            color: var(--neon-pink); letter-spacing: 0.3em; margin-top: 8px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .header-stats {
            display: flex; justify-content: center; gap: 30px; margin-top: 15px; flex-wrap: wrap;
        }
        .stat-item {
            display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-secondary);
        }
        .stat-dot {
            width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .search-bar {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 20px; background: rgba(10,10,18,0.9);
            border-bottom: 1px solid var(--grid-line);
        }

        .search-container {
            display: flex; align-items: center;
            background: rgba(13,13,24,0.9); border: 1px solid var(--neon-cyan);
            padding: 10px 20px; max-width: 500px; width: 100%; position: relative;
        }

        .search-container::before {
            content: 'SEARCH://'; font-size: 0.7rem; color: var(--neon-cyan);
            letter-spacing: 0.1em; margin-right: 12px;
        }

        .search-input {
            background: transparent; border: none; color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; width: 100%; outline: none;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-hint {
            font-size: 0.65rem; color: var(--text-muted); margin-top: 8px; text-align: center;
        }

        .search-results-count {
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
            color: var(--neon-green); margin-left: 10px; white-space: nowrap;
        }

        .category-nav {
            display: flex; justify-content: center; gap: 0; padding: 20px;
            background: rgba(10,10,18,0.8); border-bottom: 1px solid var(--grid-line); flex-wrap: wrap;
        }

        .cat-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 500;
            letter-spacing: 0.1em; padding: 14px 28px; background: transparent;
            border: 1px solid var(--text-muted); color: var(--text-secondary);
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }

        .cat-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            transition: left 0.5s;
        }
        .cat-btn:hover::before { left: 100%; }
        .cat-btn:hover {
            border-color: var(--neon-cyan); color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan);
        }
        .cat-btn.active {
            background: var(--neon-cyan); border-color: var(--neon-cyan); color: var(--bg-deep);
            text-shadow: none; box-shadow: 0 0 20px var(--neon-cyan);
        }

        .main-content {
            max-width: 1400px; margin: 0 auto; padding: 30px 20px;
        }

        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--grid-line);
        }

        .section-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700;
            color: var(--neon-pink); letter-spacing: 0.1em; text-shadow: 0 0 10px var(--neon-pink);
        }

        .data-source-btn {
            font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
            letter-spacing: 0.1em; padding: 10px 20px; background: transparent;
            border: 1px solid var(--neon-purple); color: var(--neon-purple);
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .data-source-btn:hover {
            background: var(--neon-purple); color: var(--bg-deep); box-shadow: 0 0 15px var(--neon-purple);
        }

        .leaderboard-container {
            background: rgba(13,13,24,0.9); border: 1px solid var(--grid-line);
            overflow-x: auto; position: relative;
        }

        .leaderboard-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple));
        }

        .leaderboard-table { width: 100%; border-collapse: collapse; min-width: 800px; }

        .table-header { background: rgba(5,217,232,0.1); border-bottom: 2px solid var(--neon-cyan); }
        .table-header th {
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 0.1em; color: var(--neon-cyan); padding: 15px 10px;
            text-align: left; text-shadow: 0 0 5px var(--neon-cyan);
        }
        .table-header th.center { text-align: center; }

        .table-row { border-bottom: 1px solid var(--grid-line); transition: all 0.3s; }
        .table-row:hover { background: rgba(255,42,109,0.1); border-bottom-color: var(--neon-pink); }
        .table-row td { padding: 12px 10px; font-size: 0.85rem; color: var(--text-primary); }
        .table-row td.center { text-align: center; }

        .rank-cell { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1rem; width: 60px; }
        .rank-1 { color: var(--rank-gold); text-shadow: 0 0 10px var(--rank-gold); }
        .rank-2 { color: var(--rank-silver); text-shadow: 0 0 10px var(--rank-silver); }
        .rank-3 { color: var(--rank-bronze); text-shadow: 0 0 10px var(--rank-bronze); }
        .rank-other { color: var(--text-muted); }

        .product-name { font-weight: 500; color: var(--text-primary); }
        .product-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 3px; display: flex; gap: 8px; flex-wrap: wrap; }
        .product-meta-item { display: flex; gap: 4px; }
        .product-meta-label { color: var(--neon-orange); }

        .score-cell { display: flex; align-items: center; gap: 10px; justify-content: center; }
        .score-bar { width: 120px; height: 10px; background: rgba(5,217,232,0.2); position: relative; overflow: hidden; border-radius: 2px; }
        .score-fill { height: 100%; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green)); transition: width 0.5s; border-radius: 2px; }
        .score-value { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); min-width: 50px; text-align: right; }

        .specs-cell { display: flex; gap: 6px; flex-wrap: wrap; }
        .spec-tag {
            font-size: 0.65rem; padding: 3px 8px; background: rgba(5,217,232,0.15);
            border: 1px solid var(--grid-line); color: var(--text-secondary); letter-spacing: 0.05em; white-space: nowrap;
        }

        .detail-btn {
            font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
            letter-spacing: 0.1em; padding: 6px 12px; background: transparent;
            border: 1px solid var(--neon-orange); color: var(--neon-orange);
            cursor: pointer; transition: all 0.3s;
        }
        .detail-btn:hover { background: var(--neon-orange); color: var(--bg-deep); box-shadow: 0 0 10px var(--neon-orange); }

        .price-cell { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--neon-yellow); }

        /* Pagination */
        .pagination-container {
            display: flex; justify-content: center; align-items: center;
            gap: 6px; padding: 20px; flex-wrap: wrap;
        }

        .page-btn {
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 500;
            letter-spacing: 0.05em; padding: 8px 14px; background: transparent;
            border: 1px solid var(--text-muted); color: var(--text-secondary);
            cursor: pointer; transition: all 0.3s; min-width: 38px; text-align: center;
        }
        .page-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
        .page-btn.active {
            background: var(--neon-cyan); border-color: var(--neon-cyan);
            color: var(--bg-deep); box-shadow: 0 0 10px var(--neon-cyan);
        }
        .page-btn:disabled {
            opacity: 0.3; cursor: not-allowed;
        }
        .page-btn:disabled:hover {
            border-color: var(--text-muted); color: var(--text-secondary);
        }

        .page-info {
            font-size: 0.75rem; color: var(--text-muted); margin: 0 8px;
        }

        /* Detail Modal */
        .detail-modal {
            display: none; position: fixed; inset: 0; background: rgba(10,10,18,0.95);
            z-index: 2000; justify-content: center; align-items: center;
            padding: 20px; overflow-y: auto;
        }
        .detail-modal.active { display: flex; }

        .detail-content {
            background: rgba(13,13,24,0.95); border: 2px solid var(--neon-orange);
            padding: 30px; max-width: 600px; width: 100%; position: relative;
        }
        .detail-content::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-orange), var(--neon-pink), var(--neon-cyan));
            z-index: -1; filter: blur(20px); opacity: 0.3;
        }

        .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .detail-title { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--neon-orange); letter-spacing: 0.1em; }
        .detail-rank { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; }

        .detail-close {
            position: absolute; top: 15px; right: 15px; width: 30px; height: 30px;
            background: transparent; border: 1px solid var(--text-muted);
            color: var(--text-muted); cursor: pointer; font-size: 1rem; transition: all 0.3s;
        }
        .detail-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }

        .detail-meta { display: flex; gap: 15px; margin-bottom: 20px; font-size: 0.75rem; color: var(--text-secondary); flex-wrap: wrap; }
        .detail-meta-item { display: flex; gap: 5px; }
        .detail-meta-label { color: var(--neon-cyan); }

        .detail-desc {
            font-size: 0.9rem; color: var(--text-primary); line-height: 1.7;
            margin-bottom: 20px; padding: 15px; background: rgba(5,217,232,0.1);
            border-left: 3px solid var(--neon-cyan);
        }

        .detail-specs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .detail-spec-tag {
            font-size: 0.75rem; padding: 5px 12px; background: rgba(255,107,53,0.2);
            border: 1px solid var(--neon-orange); color: var(--neon-orange);
        }

        .modal-close-btn {
            margin-top: 20px; padding: 10px 20px; background: transparent;
            border: 1px solid var(--text-muted); color: var(--text-secondary);
            cursor: pointer; font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem; letter-spacing: 0.1em; transition: all 0.3s;
        }
        .modal-close-btn:hover { border-color: var(--neon-pink); color: var(--neon-pink); }

        /* Source Modal */
        .source-modal {
            display: none; position: fixed; inset: 0; background: rgba(10,10,18,0.95);
            z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .source-modal.active { display: flex; }

        .source-content {
            background: rgba(13,13,24,0.95); border: 2px solid var(--neon-cyan);
            padding: 30px; max-width: 600px; width: 100%;
        }
        .source-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--neon-cyan); margin-bottom: 20px; letter-spacing: 0.1em; }
        .source-list { display: flex; flex-direction: column; gap: 10px; }
        .source-link {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(5,217,232,0.1); border: 1px solid var(--grid-line);
            color: var(--text-primary); text-decoration: none; transition: all 0.3s;
        }
        .source-link:hover { border-color: var(--neon-cyan); background: rgba(5,217,232,0.2); }
        .source-link-name { font-size: 0.85rem; }
        .source-link-arrow { font-size: 0.7rem; color: var(--neon-cyan); }

        /* Article Modal */
        .article-modal {
            display: none; position: fixed; inset: 0; background: rgba(10,10,18,0.95);
            z-index: 2000; justify-content: center; align-items: flex-start;
            padding: 20px; overflow-y: auto;
        }
        .article-modal.active { display: flex; }

        .article-content {
            background: rgba(13,13,24,0.95); border: 2px solid var(--neon-pink);
            padding: 40px; max-width: 800px; width: 100%; position: relative; margin: 20px auto;
        }
        .article-content::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
            z-index: -1; filter: blur(30px); opacity: 0.3;
        }

        .article-header { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--grid-line); }
        .article-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700;
            color: var(--neon-pink); letter-spacing: 0.05em; line-height: 1.4;
        }
        .article-meta { display: flex; gap: 15px; margin-top: 15px; font-size: 0.75rem; color: var(--text-muted); flex-wrap: wrap; }
        .article-meta-item { display: flex; gap: 5px; }
        .article-meta-label { color: var(--neon-cyan); }

        .article-body {
            font-size: 0.95rem; color: var(--text-primary); line-height: 1.8; margin-bottom: 30px;
        }
        .article-body p { margin-bottom: 15px; }

        .article-source-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; background: transparent; border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); cursor: pointer;
            font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
            letter-spacing: 0.1em; transition: all 0.3s; text-decoration: none;
        }
        .article-source-btn:hover {
            background: var(--neon-cyan); color: var(--bg-deep); box-shadow: 0 0 15px var(--neon-cyan);
        }

        .article-close {
            position: absolute; top: 15px; right: 15px; width: 30px; height: 30px;
            background: transparent; border: 1px solid var(--text-muted);
            color: var(--text-muted); cursor: pointer; font-size: 1rem; transition: all 0.3s;
        }
        .article-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }

        /* News/Knowledge Cards */
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;
        }

        .card-item {
            background: rgba(13,13,24,0.9); border: 1px solid var(--grid-line);
            padding: 20px; cursor: pointer; transition: all 0.3s; position: relative;
        }

        .card-item::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
            background: var(--neon-pink);
        }

        .card-item:hover {
            border-color: var(--neon-pink); transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255,42,109,0.2);
        }

        .card-item-title {
            font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700;
            color: var(--neon-pink); margin-bottom: 10px; line-height: 1.4;
        }

        .card-item-meta {
            display: flex; gap: 10px; font-size: 0.65rem; color: var(--text-muted); margin-bottom: 10px;
        }

        .card-item-desc {
            font-size: 0.8rem; color: var(--text-secondary); line-height: 1.5;
        }

        .card-item-tags {
            display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px;
        }

        .card-tag {
            font-size: 0.6rem; padding: 2px 6px; background: rgba(255,42,109,0.2);
            border: 1px solid var(--neon-pink); color: var(--neon-pink);
        }

        /* Footer */
        .cyber-footer {
            text-align: center; padding: 30px 20px; border-top: 1px solid var(--grid-line);
            background: linear-gradient(180deg, transparent, rgba(5,217,232,0.05)); margin-top: 40px;
        }
        .footer-text { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.2em; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .footer-link { font-size: 0.7rem; color: var(--text-secondary); text-decoration: none; transition: color 0.3s; }
        .footer-link:hover { color: var(--neon-cyan); }

        /* Animations */
        @keyframes rowFadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .table-row { animation: rowFadeIn 0.4s ease backwards; }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-item { animation: cardFadeIn 0.4s ease backwards; }

        .no-results {
            text-align: center; padding: 60px 20px; color: var(--text-muted);
        }
        .no-results-icon { font-size: 2rem; color: var(--neon-pink); margin-bottom: 10px; }

        /* Responsive */
        @media (max-width: 768px) {
            .leaderboard-table { font-size: 0.8rem; min-width: 600px; }
            .table-header th, .table-row td { padding: 8px 6px; }
            .score-bar { width: 60px; }
            .cat-btn { padding: 10px 16px; font-size: 0.75rem; }
            .card-grid { grid-template-columns: 1fr; }
            .page-btn { padding: 6px 10px; font-size: 0.65rem; min-width: 30px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="glow-orb pink"></div>
    <div class="glow-orb cyan"></div>
    <div class="scanlines"></div>

    <header class="cyber-header">
        <h1 class="cyber-title">HARDWARE RANK</h1>
        <p class="cyber-subtitle">// 天梯榜 · 性能排行 · 数据聚合</p>
        <div class="header-stats">
            <div class="stat-item">
                <div class="stat-dot"></div>
                <span>DATA SYNC: ACTIVE</span>
            </div>
            <div class="stat-item">
                <div class="stat-dot"></div>
                <span>SOURCES: 15 VERIFIED</span>
            </div>
            <div class="stat-item">
                <div class="stat-dot"></div>
                <span id="updateTime">UPDATE: 2026年6月</span>
            </div>
        </div>
    </header>

    <div class="search-bar">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="输入产品名称快速查找你的硬件...">
            <span class="search-results-count" id="searchCount"></span>
        </div>
        <p class="search-hint">支持搜索产品名称、品牌、规格参数</p>
    </div>

    <!-- Detail Modal -->

    <!-- Source Modal -->
    <div class="source-modal" id="sourceModal">
        <div class="source-content">
            <h3 class="source-title">数据来源 SOURCES</h3>

            <button class="modal-close-btn" onclick="closeSourceModal()">关闭</button>

    <!-- Article Modal -->
    <div class="article-modal" id="articleModal">
        <div class="article-content">
            <button class="article-close" onclick="closeArticleModal()">&times;</button>
            <div class="article-header">
                <h1 class="article-title" id="articleTitle"></h1>
                <div class="article-meta" id="articleMeta"></div>
            </div>
            <div class="article-body" id="articleBody"></div>
            <div class="article-tags" id="articleTags" style="margin-bottom: 20px; display: flex; gap: 6px; flex-wrap: wrap;"></div>

                <span>&#x2192;</span>

            </a>
        </div>

    <footer class="cyber-footer">
        <p class="footer-text">HARDWARE RANK SYSTEM <span style="color: var(--neon-pink);">//</span> 数据仅供参考，点击来源查看详情</p>
        <div class="footer-links">
            <a href="https://www.zhihu.com/topic/19550270/hot" class="footer-link" target="_blank">知乎硬件话题</a>
            <a href="https://www.bilibili.com/v/knowledge/hardware/" class="footer-link" target="_blank">B站硬件评测</a>
            <a href="https://www.ithome.com/" class="footer-link" target="_blank">IT之家</a>
            <a href="https://www.mydrivers.com/" class="footer-link" target="_blank">快科技</a>
        </div>
    </footer>

    <!-- Load data JS first -->
    <script src="hardware_data.js"></script>

    <script>
        // ===== HARDWARE_DATA is loaded from hardware_data.js =====

        // ===== Category Config =====
        // GPU/CPU have 2800+ items -> 20 per page
        // All others show all items (since < 20)

        const categoryConfig = {
            gpu: {
                title: 'GPU 天梯榜',
                itemsPerPage: 20,
                dataKey: 'gpu'
            },
            cpu: {
                title: 'CPU 天梯榜',
                itemsPerPage: 20,
                dataKey: 'cpu'
            },
            mobile: {
                title: '手机处理器天梯榜',
                itemsPerPage: 0, // 0 = show all
                dataKey: 'mobile'
            },
            ssd: {
                title: 'SSD 天梯榜',
                itemsPerPage: 0,
                dataKey: 'ssd'
            },
            memory: {
                title: 'DDR5 内存天梯榜',
                itemsPerPage: 0,
                dataKey: 'memory'
            },
            news: {
                title: '硬件新闻',
                itemsPerPage: 0,
                dataKey: 'news',
                isArticle: true
            },
            knowledge: {
                title: '硬件知识',
                itemsPerPage: 0,
                dataKey: 'knowledge',
                isArticle: true
            }
        };

        // Source links data
        const sourceLinks = [
            { name: 'PassMark GPU Benchmark', url: 'https://www.videocardbenchmark.net/high_end_gpus.html' },
            { name: 'PassMark CPU Benchmark', url: 'https://www.cpubenchmark.net/' },
            { name: 'Notebookcheck', url: 'https://www.notebookcheck.net/' },
            { name: 'Storage Review', url: 'https://www.storagereview.com/' },
            { name: 'TechPowerUp', url: 'https://www.techpowerup.com/' },
            { name: 'IT之家', url: 'https://www.ithome.com/' },
            { name: '快科技', url: 'https://www.mydrivers.com/' },
            { name: '中关村在线', url: 'https://www.zol.com.cn/' },
            { name: '知乎硬件话题', url: 'https://www.zhihu.com/topic/19550270/hot' },
            { name: 'B站硬件评测', url: 'https://www.bilibili.com/v/knowledge/hardware/' },
            { name: '极客湾', url: 'https://space.bilibili.com/2018922' },
            { name: 'GSMArena', url: 'https://www.gsmarena.com/' },
            { name: 'AnandTech', url: 'https://www.anandtech.com/' },
            { name: '驱动之家', url: 'https://www.mydrivers.com/' },
            { name: 'TechWeb', url: 'https://www.techweb.com.cn/' }
        ];

        // ===== State =====
        let currentCategory = 'gpu';
        let currentPage = 1;
        let searchQuery = '';
        let currentFilteredData = [];

        // ===== Helpers =====
        function getMaxScore(data) {
            let max = 0;
            for (let i = 0; i < data.length; i++) {
                if (data[i].score > max) max = data[i].score;
            }
            return max;
        }

        function getDataForCategory(cat) {
            const cfg = categoryConfig[cat];
            if (!cfg || !HARDWARE_DATA || !HARDWARE_DATA[cfg.dataKey]) return [];
            return HARDWARE_DATA[cfg.dataKey];
        }

        function formatDate(item) {
            if (item.year && item.month) {
                return item.year + '.' + String(item.month).padStart(2, '0');
            }
            return '';
        }

        function formatPrice(price, isCNY) {
            if (price === null || price === undefined) return '暂无';
            if (typeof price === 'number') {
                if (isCNY) {
                    if (price >= 10000) {
                        return '¥' + (price / 10000).toFixed(2) + '万';
                    }
                    return '¥' + Math.round(price);
                } else {
                    if (price >= 10000) {
                        return '$' + (price / 10000).toFixed(2) + '万';
                    }
                    return '$' + price.toFixed(2).replace(/\.?0+$/, '');
                }
            }
            return String(price);
        }

        // ===== Search & Filter =====
        function getFilteredData() {
            const allData = getDataForCategory(currentCategory);
            if (!allData || !allData.length) return [];

            // Sort by score descending for ranking categories
            const cfg = categoryConfig[currentCategory];
            let sorted = [];
            if (!cfg.isArticle) {
                sorted = allData.slice().sort(function(a, b) {
                    return (b.score || 0) - (a.score || 0);
                });
            } else {
                sorted = allData.slice();
            }

            if (!searchQuery) return sorted;

            var query = searchQuery.toLowerCase();
            return sorted.filter(function(item) {
                if (item.name && item.name.toLowerCase().indexOf(query) !== -1) return true;
                if (item.brand && item.brand.toLowerCase().indexOf(query) !== -1) return true;
                if (item.specs && item.specs.some(function(s) { return s.toLowerCase().indexOf(query) !== -1; })) return true;
                if (item.desc && item.desc.toLowerCase().indexOf(query) !== -1) return true;
                if (item.fullContent && item.fullContent.toLowerCase().indexOf(query) !== -1) return true;
                return false;
            });
        }

        // ===== Render =====
        function render() {
            const cfg = categoryConfig[currentCategory];
            document.getElementById('sectionTitle').textContent = cfg.title;

            currentFilteredData = getFilteredData();

            if (searchQuery) {
                document.getElementById('searchCount').textContent = '(' + currentFilteredData.length + '\u6761\u7ed3\u679c)';
            } else {
                document.getElementById('searchCount').textContent = '';
            }

            if (currentFilteredData.length === 0) {
                document.getElementById('leaderboard').innerHTML =
                    '<div class="no-results"><div class="no-results-icon">!</div><p>\u6ca1\u6709\u627e\u5230\u76f8\u5173\u7ed3\u679c</p></div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            if (cfg.isArticle) {
                renderCards();
            } else {
                renderTable();
            }
        }

        // ===== Render Table =====
        function renderTable() {
            const cfg = categoryConfig[currentCategory];
            const totalItems = currentFilteredData.length;
            const itemsPerPage = cfg.itemsPerPage > 0 ? cfg.itemsPerPage : totalItems;
            const totalPages = Math.ceil(totalItems / itemsPerPage);

            // Clamp current page
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, totalItems);
            const pageData = currentFilteredData.slice(startIdx, endIdx);

            // Find max score for bar normalization (within all data, not just page)
            const maxScore = getMaxScore(currentFilteredData);

            var html = '<table class="leaderboard-table">' +
                '<thead class="table-header"><tr>' +
                '<th class="center">\u6392\u540d</th>' +
                '<th>\u4ea7\u54c1\u540d\u79f0</th>' +
                '<th class="center">\u7efc\u5408\u8bc4\u5206</th>' +
                '<th>\u89c4\u683c\u53c2\u6570</th>' +
                '<th class="center">\u53c2\u8003\u4ef7\u683c</th>' +
                '<th class="center">\u8be6\u60c5</th>' +
                '</tr></thead><tbody>';

            for (var i = 0; i < pageData.length; i++) {
                var item = pageData[i];
                var actualRank = searchQuery ? item.rank : (startIdx + i + 1);
                var rankClass = 'rank-other';
                if (actualRank === 1) rankClass = 'rank-1';
                else if (actualRank === 2) rankClass = 'rank-2';
                else if (actualRank === 3) rankClass = 'rank-3';

                var barPercent = maxScore > 0 ? (item.score / maxScore * 100) : 0;
                barPercent = Math.max(barPercent, 1);
                var scoreDisplay = item.score !== undefined ? item.score : '-';

                var dateDisplay = formatDate(item);
                var brandYear = item.brand;
                if (dateDisplay) brandYear = item.brand + ' ' + dateDisplay;

                var priceDisplay = formatPrice(item.priceCN || item.price, !!item.priceCN);

                // Specs tags
                var specsHtml = '';
                if (item.specs && item.specs.length > 0) {
                    for (var s = 0; s < item.specs.length; s++) {
                        specsHtml += '<span class="spec-tag">' + escapeHtml(item.specs[s]) + '</span>';
                    }
                } else {
                    specsHtml = '<span class="spec-tag" style="color: var(--text-muted);">\u6682\u65e0</span>';
                }

                // Build detail button with encoded data
                var itemJson = encodeURIComponent(JSON.stringify(item));

                html += '<tr class="table-row" style="animation-delay: ' + (i * 0.05) + 's">' +
                    '<td class="rank-cell center ' + rankClass + '">#' + actualRank + '</td>' +
                    '<td>' +
                    '<div class="product-name">' + escapeHtml(item.name) + '</div>' +
                    '<div class="product-meta">' +
                    '<span class="product-meta-item"><span style="color:var(--neon-cyan);">' + escapeHtml(brandYear) + '</span></span>' +
                    '</div>' +
                    '</td>' +
                    '<td class="center">' +
                    '<div class="score-cell">' +
                    '<div class="score-bar"><div class="score-fill" style="width:' + barPercent + '%"></div></div>' +
                    '<span class="score-value">' + scoreDisplay + '</span>' +
                    '</div>' +
                    '</td>' +
                    '<td><div class="specs-cell">' + specsHtml + '</div></td>' +
                    '<td class="center price-cell">' + priceDisplay + '</td>' +
                    '<td class="center">' +
                    '<button class="detail-btn" data-item="' + itemJson + '">\u67e5\u770b\u8be6\u60c5</button>' +
                    '</td>' +
                    '</tr>';
            }

            html += '</tbody></table>';
            document.getElementById('leaderboard').innerHTML = html;

            // Pagination
            renderPagination(totalItems, itemsPerPage, totalPages);
        }

        // ===== Render Cards (News & Knowledge) =====
        function renderCards() {
            const totalItems = currentFilteredData.length;

            var html = '<div class="card-grid">';
            for (var i = 0; i < currentFilteredData.length; i++) {
                var article = currentFilteredData[i];
                var dateDisplay = formatDate(article);
                var desc = article.fullContent ? article.fullContent.substring(0, 120) + '...' : (article.desc ? article.desc.substring(0, 120) + '...' : '');
                var tags = article.specs || [];

                var articleJson = encodeURIComponent(JSON.stringify(article));

                html += '<div class="card-item" style="animation-delay: ' + (i * 0.1) + 's" data-article="' + articleJson + '">' +
                    '<div class="card-item-title">' + escapeHtml(article.name) + '</div>' +
                    '<div class="card-item-meta">' +
                    '<span>' + escapeHtml(article.brand) + '</span>' +
                    (dateDisplay ? '<span>' + dateDisplay + '</span>' : '') +
                    '</div>' +
                    '<div class="card-item-desc">' + escapeHtml(desc) + '</div>' +
                    '<div class="card-item-tags">';
                for (var t = 0; t < tags.length; t++) {
                    html += '<span class="card-tag">' + escapeHtml(tags[t]) + '</span>';
                }
                html += '</div></div>';
            }
            html += '</div>';

            document.getElementById('leaderboard').innerHTML = html;

            // Only show total info for cards since we show all
            document.getElementById('pagination').innerHTML =
                '<span class="page-info">\u5171' + totalItems + '\u6761</span>';
        }

        // ===== Pagination =====
        function renderPagination(totalItems, itemsPerPage, totalPages) {
            var html = '';
            var showPagination = itemsPerPage > 0 && totalItems > itemsPerPage;

            if (totalItems === 0) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            if (showPagination) {
                // Prev button
                html += '<button class="page-btn" onclick="goToPage(' + (currentPage - 1) + ')"' +
                    (currentPage <= 1 ? ' disabled' : '') + '>\u2039 \u4e0a\u4e00\u9875</button>';

                // Page numbers
                var maxVisiblePages = 7;
                var startPage = 1;
                var endPage = totalPages;

                if (totalPages > maxVisiblePages) {
                    var half = Math.floor(maxVisiblePages / 2);
                    startPage = currentPage - half;
                    if (startPage < 1) startPage = 1;
                    endPage = startPage + maxVisiblePages - 1;
                    if (endPage > totalPages) {
                        endPage = totalPages;
                        startPage = totalPages - maxVisiblePages + 1;
                        if (startPage < 1) startPage = 1;
                    }
                }

                if (startPage > 1) {
                    html += '<button class="page-btn" onclick="goToPage(1)">1</button>';
                    if (startPage > 2) {
                        html += '<span class="page-info">...</span>';
                    }
                }

                for (var p = startPage; p <= endPage; p++) {
                    var activeClass = p === currentPage ? ' active' : '';
                    html += '<button class="page-btn' + activeClass + '" onclick="goToPage(' + p + ')">' + p + '</button>';
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        html += '<span class="page-info">...</span>';
                    }
                    html += '<button class="page-btn" onclick="goToPage(' + totalPages + ')">' + totalPages + '</button>';
                }

                // Next button
                html += '<button class="page-btn" onclick="goToPage(' + (currentPage + 1) + ')"' +
                    (currentPage >= totalPages ? ' disabled' : '') + '>\u4e0b\u4e00\u9875 \u203a</button>';

                // Info
                html += '<span class="page-info">\u5171 ' + totalItems + ' \u6761\uff0c\u7b2c ' + currentPage + '/' + totalPages + ' \u9875</span>';
            } else {
                html = '<span class="page-info">\u5171 ' + totalItems + ' \u6761</span>';
            }

            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            const cfg = categoryConfig[currentCategory];
            const totalItems = currentFilteredData.length;
            const itemsPerPage = cfg.itemsPerPage > 0 ? cfg.itemsPerPage : totalItems;
            const totalPages = Math.ceil(totalItems / itemsPerPage);

            if (page < 1 || page > totalPages) return;
            currentPage = page;
            render();
        }

        // ===== Escape HTML =====
        function escapeHtml(str) {
            if (typeof str !== 'string') return String(str);
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ===== Show Detail Modal =====
        function showDetail(itemStr) {
            var item;
            if (typeof itemStr === 'string') {
                try { item = JSON.parse(itemStr); } catch(e) { return; }
            } else {
                item = itemStr;
            }

            var modal = document.getElementById('detailModal');
            var dateDisplay = formatDate(item);

            document.getElementById('detailTitle').textContent = item.name || '';

            var metaHtml = '';
            var brandYear = item.brand;
            if (dateDisplay) brandYear = item.brand + ' ' + dateDisplay;
            metaHtml += '<div class="detail-meta-item"><span class="detail-meta-label">型号:</span><span style="color:var(--neon-cyan);">' + escapeHtml(brandYear) + '</span></div>';
            if (item.g3dMark) {
                metaHtml += '<div class="detail-meta-item"><span class="detail-meta-label">G3D Mark:</span><span>' + item.g3dMark + '</span></div>';
            }
            var detailPrice = item.priceCN || item.price;
            if (detailPrice !== null && detailPrice !== undefined) {
                metaHtml += '<div class="detail-meta-item"><span class="detail-meta-label">参考价:</span><span style="color:var(--neon-yellow);">' + formatPrice(detailPrice, !!item.priceCN) + '</span></div>';
            }
            if (item.score !== undefined) {
                metaHtml += '<div class="detail-meta-item"><span class="detail-meta-label">\u8bc4\u5206:</span><span style="color:var(--neon-green);">' + item.score + '</span></div>';
            }
            document.getElementById('detailMeta').innerHTML = metaHtml;

            var rankClass = 'rank-other';
            var rank = item.rank || 0;
            if (rank === 1) rankClass = 'rank-1';
            else if (rank === 2) rankClass = 'rank-2';
            else if (rank === 3) rankClass = 'rank-3';
            document.getElementById('detailRank').innerHTML = '<span class="' + rankClass + '">#' + rank + '</span>';

            document.getElementById('detailDesc').textContent = item.desc || '\u6682\u65e0\u8bf4\u660e';

            var specsHtml = '';
            if (item.specs && item.specs.length > 0) {
                for (var i = 0; i < item.specs.length; i++) {
                    specsHtml += '<span class="detail-spec-tag">' + escapeHtml(item.specs[i]) + '</span>';
                }
            } else {
                specsHtml = '<span style="font-size:0.75rem;color:var(--text-muted);">\u6682\u65e0\u89c4\u683c\u4fe1\u606f</span>';
            }
            document.getElementById('detailSpecs').innerHTML = specsHtml;

            modal.classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // ===== Show Article Modal =====
        function showArticle(itemStr) {
            var article;
            if (typeof itemStr === 'string') {
                try { article = JSON.parse(itemStr); } catch(e) { return; }
            } else {
                article = itemStr;
            }

            var modal = document.getElementById('articleModal');
            var dateDisplay = '';
            if (article.year && article.month) {
                dateDisplay = article.year + '\u5e74' + article.month + '\u6708';
            }

            document.getElementById('articleTitle').textContent = article.name || '';

            var metaHtml = '';
            if (article.brand) {
                metaHtml += '<div class="article-meta-item"><span class="article-meta-label">\u6765\u6e90:</span><span>' + escapeHtml(article.brand) + '</span></div>';
            }
            if (dateDisplay) {
                metaHtml += '<div class="article-meta-item"><span class="article-meta-label">\u53d1\u5e03:</span><span>' + dateDisplay + '</span></div>';
            }
            document.getElementById('articleMeta').innerHTML = metaHtml;

            // Format content with paragraphs
            var content = article.fullContent || article.desc || '';
            var paragraphs = content.split(/([^\n]+)/).filter(function(p) { return p.trim(); });
            var bodyHtml = '';
            for (var i = 0; i < paragraphs.length; i++) {
                var p = paragraphs[i].trim();
                if (p) {
                    bodyHtml += '<p>' + escapeHtml(p) + '</p>';
                }
            }
            if (!bodyHtml) bodyHtml = '<p>\u6682\u65e0\u5185\u5bb9</p>';
            document.getElementById('articleBody').innerHTML = bodyHtml;

            // Tags
            var tagsHtml = '';
            if (article.specs && article.specs.length > 0) {
                for (var i = 0; i < article.specs.length; i++) {
                    tagsHtml += '<span class="detail-spec-tag" style="background:rgba(255,42,109,0.2);border-color:var(--neon-pink);color:var(--neon-pink);">' + escapeHtml(article.specs[i]) + '</span>';
                }
            }
            document.getElementById('articleTags').innerHTML = tagsHtml;

            document.getElementById('articleSourceBtn').href = article.sourceUrl || '#';

            modal.classList.add('active');
        }

        function closeArticleModal() {
            document.getElementById('articleModal').classList.remove('active');
        }

        // ===== Source Modal =====
        function renderSourceLinks() {
            var list = document.getElementById('sourceList');
            var html = '';
            for (var i = 0; i < sourceLinks.length; i++) {
                html += '<a class="source-link" href="' + escapeHtml(sourceLinks[i].url) + '" target="_blank">' +
                    '<span class="source-link-name">' + escapeHtml(sourceLinks[i].name) + '</span>' +
                    '<span class="source-link-arrow">\u2192</span></a>';
            }
            list.innerHTML = html;
        }

        function closeSourceModal() {
            document.getElementById('sourceModal').classList.remove('active');
        }

        // ===== Init =====
        function init() {
            render();
            renderSourceLinks();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Category buttons
            var buttons = document.querySelectorAll('.cat-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].addEventListener('click', function() {
                    var btns = document.querySelectorAll('.cat-btn');
                    for (var j = 0; j < btns.length; j++) {
                        btns[j].classList.remove('active');
                    }
                    this.classList.add('active');
                    currentCategory = this.getAttribute('data-category');
                    currentPage = 1;
                    searchQuery = '';
                    document.getElementById('searchInput').value = '';
                    document.getElementById('searchCount').textContent = '';
                    render();
                });
            }

            // Search input
            document.getElementById('searchInput').addEventListener('input', function(e) {
                searchQuery = e.target.value.toLowerCase();
                currentPage = 1;
                render();
            });

            // Source button
            document.getElementById('sourceBtn').addEventListener('click', function() {
                document.getElementById('sourceModal').classList.add('active');
            });

            // Close modals on background click
            document.getElementById('sourceModal').addEventListener('click', function(e) {
                if (e.target === this) closeSourceModal();
            });
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) closeDetailModal();
            });
            document.getElementById('articleModal').addEventListener('click', function(e) {
                if (e.target === this) closeArticleModal();
            });

            // Event delegation: detail button clicks
            document.getElementById('leaderboard').addEventListener('click', function(e) {
                var target = e.target;
                while (target && target !== this) {
                    if (target.classList && target.classList.contains('detail-btn')) {
                        var itemStr = target.getAttribute('data-item');
                        if (itemStr) {
                            var item = JSON.parse(decodeURIComponent(itemStr));
                            showDetail(item);
                        }
                        e.preventDefault();
                        return;
                    }
                    if (target.classList && target.classList.contains('card-item')) {
                        var articleStr = target.getAttribute('data-article');
                        if (articleStr) {
                            var article = JSON.parse(decodeURIComponent(articleStr));
                            showArticle(article);
                        }
                        e.preventDefault();
                        return;
                    }
                    target = target.parentElement;
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
